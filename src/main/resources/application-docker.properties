# ============================================================
# EduFlow Platform Docker 环境配置
# ============================================================

# 数据库配置（通过环境变量注入）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.abs.system.domain
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 服务器端口
server.port=8020

# 文件上传大小限制
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# 静态资源配置
spring.mvc.static-path-pattern=/**
server.servlet.context-path=/

# AI 服务配置（从环境变量读取）
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.base-url=https://api.deepseek.com
deepseek.chat-path=/chat/completions
deepseek.timeout=30

doubao.api-key=${DOUBAO_API_KEY:}
doubao.api-secret=${DOUBAO_API_SECRET:}
doubao.api-url=https://ark.cn-beijing.volces.com
doubao.seedbao=53f20ea3-d349-4608-a37b-e297f684db0a

glm.api-key=${GLM_API_KEY:}
glm.base-url=https://open.bigmodel.cn/api/paas/v4/
glm.model=glm-3-turbo

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1/

# 默认 AI 提供商
ai.provider=deepseek

# 静态资源目录
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# 日志配置
logging.level.root=INFO
logging.level.com.abs.system=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.jdbc=INFO
logging.level.com.baomidou.mybatisplus=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n

# 文件上传路径
upload.path=${UPLOAD_PATH:/app/uploads}
