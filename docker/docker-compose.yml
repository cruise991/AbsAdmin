version: '3.8'

# ============================================================
# EduFlow Platform Docker Compose 配置
# ============================================================

services:
  # ----------------------------------------------------------
  # MySQL 数据库服务
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: absadmin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-19950123qwe!@#}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-absframe}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../init-db:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-connections=200
      - --innodb-buffer-pool-size=512M
    networks:
      - absadmin-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-19950123qwe!@#}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------
  # EduFlow Platform Spring Boot 应用服务
  # ----------------------------------------------------------
  absadmin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: absadmin-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8020}:8020"
    environment:
      # 激活 Docker 配置文件
      SPRING_PROFILES_ACTIVE: docker
      
      # 数据库配置
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/absframe?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-19950123qwe!@#}
      
      # AI API Keys（从.env文件读取）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_API_SECRET: ${DOUBAO_API_SECRET:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      
      # 应用配置
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      SERVER_PORT: 8020
      
      # JVM 参数
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m -XX:+UseG1GC}
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
      - ./src/main/resources/driver:/app/drivers:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - absadmin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/login/istokenvalid"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ----------------------------------------------------------
  # EduFlow Frontend Vue3 应用服务
  # ----------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: eduflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3006}:80"
    depends_on:
      - absadmin
    networks:
      - absadmin-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ----------------------------------------------------------
  # Nginx 反向代理服务（可选）
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: absadmin-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d:ro
      - app-uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - absadmin
    networks:
      - absadmin-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

# ============================================================
# 网络配置
# ============================================================
networks:
  absadmin-network:
    driver: bridge
    name: absadmin-network

# ============================================================
# 数据卷配置（持久化）
# ============================================================
volumes:
  mysql-data:
    driver: local
    name: absadmin-mysql-data
  app-uploads:
    driver: local
    name: absadmin-uploads
  app-logs:
    driver: local
    name: absadmin-logs
